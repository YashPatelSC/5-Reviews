<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bellacino's Guest Feedback</title>
    <style>
        :root {
            --red: #c5121b;
            --black: #0d0d0d;
            --white: #ffffff;
            --light: #efefef;
            --gold: #f5b301;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            min-height: 100vh;
            background:
                linear-gradient(155deg,
                    var(--red) 0 8%,
                    transparent 8% 12%,
                    var(--black) 12% 20%,
                    transparent 20% 24%,
                    var(--red) 24% 32%,
                    transparent 32% 36%,
                    var(--black) 36% 44%,
                    transparent 44% 48%,
                    var(--red) 48% 56%,
                    transparent 56% 60%,
                    var(--black) 60% 68%,
                    transparent 68% 72%,
                    var(--red) 72% 80%,
                    transparent 80% 84%,
                    var(--black) 84% 92%,
                    transparent 92% 100%);
            background-attachment: fixed;
            color: var(--black);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            width: 100%;
            max-width: 760px;
            background: var(--light);
            border: 6px solid var(--black);
            box-shadow: 0 16px 36px rgba(0, 0, 0, .25);
            padding: 32px 26px;
            text-align: center;
        }

        .logo {
            max-width: 340px;
            width: 100%;
            height: auto;
            display: block;
            margin: 0 auto 14px;
        }

        .location {
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .08em;
            margin-bottom: 22px;
        }

        h1 {
            font-size: clamp(2rem, 4vw, 3.3rem);
            line-height: .95;
            color: var(--red);
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        .subtitle {
            font-size: 1.05rem;
            line-height: 1.5;
            max-width: 560px;
            margin: 0 auto 28px;
        }

        .stars {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 18px;
        }

        .star-btn {
            width: 72px;
            height: 72px;
            border: 4px solid var(--black);
            background: var(--white);
            color: var(--gold);
            font-size: 2rem;
            line-height: 1;
            cursor: pointer;
            transition: transform .15s ease, box-shadow .15s ease, background .15s ease;
            box-shadow: 0 6px 0 rgba(0, 0, 0, .15);
        }

        .star-btn:hover {
            transform: translateY(-2px);
            background: #fff8dc;
        }

        .star-btn:active {
            transform: translateY(1px);
            box-shadow: 0 3px 0 rgba(0, 0, 0, .15);
        }

        .labels {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }

        .labels span {
            width: 72px;
            font-size: .86rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .hint {
            font-size: .95rem;
            line-height: 1.5;
            color: #333;
            margin-top: 8px;
        }

        .footer-note {
            margin-top: 26px;
            font-size: .88rem;
            color: #444;
        }

        .fine-print {
            margin-top: 22px;
            text-align: center;
            color: #555;
            font-size: .9rem;
            line-height: 1.5;
            letter-spacing: .03em;
        }

        @media (max-width:600px) {
            .card {
                padding: 24px 16px;
                border-width: 4px;
            }

            .star-btn {
                width: 58px;
                height: 58px;
                font-size: 1.7rem;
            }

            .labels span {
                width: 58px;
                font-size: .72rem;
            }

            .location {
                font-size: .88rem;
            }

        }
    </style>
</head>

<body>
    <div class="card">
        <img src="bella_logo.png" alt="Bellacino's Pizza & Grinders" class="logo">
        <div class="location">Lexington, South Carolina</div>

        <h1>How Was Your Experience?</h1>
        <p class="subtitle">
            Tap a star below to leave your feedback.
        </p>

        <div class="stars">
            <button class="star-btn" onclick="goToRating(1)" aria-label="1 star">★</button>
            <button class="star-btn" onclick="goToRating(2)" aria-label="2 stars">★</button>
            <button class="star-btn" onclick="goToRating(3)" aria-label="3 stars">★</button>
            <button class="star-btn" onclick="goToRating(4)" aria-label="4 stars">★</button>
            <button class="star-btn" onclick="goToRating(5)" aria-label="5 stars">★</button>


        </div>
        <div class="fine-print">
            Bellacino's Pizza &amp; Grinders • Lexington, SC<br>
            5339 Sunset Blvd. Hwy 378 • (803) 957-6767
        </div>



    </div>

    <script>
        const googleReviewLink = "https://search.google.com/local/writereview?placeid=ChIJm5RTNXaX-IgRf8fPIc5uRRk";
        const googleFormLink = "https://forms.gle/W8pnNZMyBz5wArdb8";

        function goToRating(rating) {
            if (rating === 5) {
                if (googleReviewLink === "PASTE_GOOGLE_REVIEW_LINK_HERE" || googleReviewLink.trim() === "") {
                    alert("Add your Google review link in the code first.");
                    return;
                }
                window.location.href = googleReviewLink;
            } else {
                window.location.href = googleFormLink;
            }
        }
    </script>
</body>

</html>
