<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quality Inn West Columbia - Cayce Feedback</title>
  <style>
    :root{
      --qi-green:#007a53;
      --white:#ffffff;
      --text:#17352d;
      --soft:#f4f7f5;
      --border:#d8e4de;
    }

    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:linear-gradient(180deg, #f4f7f5 0%, #eaf2ee 100%);
      color:var(--text);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }

    .card{
      width:100%;
      max-width:600px;
      background:var(--white);
      border-radius:28px;
      box-shadow:0 18px 50px rgba(0,0,0,0.12);
      overflow:hidden;
      border:1px solid var(--border);
      text-align:center;
    }

    .top{
      background:var(--qi-green);
      padding:30px 20px;
    }

    .logo-wrap{
      width:160px;
      margin:0 auto 10px auto;
    }

    .logo-wrap img{
      width:100%;
      border-radius:20px;
    }

    .title{
      color:var(--white);
      font-size:28px;
      font-weight:700;
      margin:10px 0 0 0;
    }

    .content{
      padding:30px 20px 20px 20px;
    }

    .question{
      font-size:26px;
      font-weight:700;
      margin-bottom:25px;
    }

    .stars{
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .star-btn{
      border:2px solid var(--border);
      background:white;
      padding:18px;
      border-radius:16px;
      font-size:26px;
      cursor:pointer;
      transition:0.15s;
    }

    .star-btn:hover{
      transform:translateY(-2px);
      box-shadow:0 8px 20px rgba(0,0,0,0.08);
      border-color:#b7ccc3;
    }

    .footer{
      padding:16px 20px 24px 20px;
      font-size:14px;
      color:#6c847a;
      line-height:1.5;
    }

    @media(max-width:600px){
      .question{
        font-size:22px;
      }

      .star-btn{
        font-size:22px;
        padding:16px;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="top">
      <div class="logo-wrap">
        <img src="quality-inn-logo.png" alt="Quality Inn Logo">
      </div>
      <div class="title">Quality Inn West Columbia - Cayce</div>
    </div>

    <div class="content">
      <div class="question">How was your stay?</div>

      <div class="stars">
        <button class="star-btn" onclick="goToLink(5)">★★★★★</button>
        <button class="star-btn" onclick="goToLink(4)">★★★★☆</button>
        <button class="star-btn" onclick="goToLink(3)">★★★☆☆</button>
        <button class="star-btn" onclick="goToLink(2)">★★☆☆☆</button>
        <button class="star-btn" onclick="goToLink(1)">★☆☆☆☆</button>
      </div>
    </div>

    <div class="footer">
      Thank you for your feedback. Your response helps us improve the guest experience.
    </div>
  </div>

  <script>
    const googleReviewLink = "https://search.google.com/local/writereview?placeid=ChIJqY9_DOi9-IgRhF9Y8T2XGU4";
    const privateFeedbackLink = "https://forms.gle/RghDG914xT9mZc6fA";

    function goToLink(rating){
      if(rating >= 4){
        window.location.href = googleReviewLink;
      } else {
        window.location.href = privateFeedbackLink;
      }
    }
  </script>
</body>
</html>
